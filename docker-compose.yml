services:
  app:
    image: langgraph-bot:local
    build: .
    env_file: .env
    environment:
      LANGGRAPH_PG: postgresql://languser:langpass@postgres:5432/langgraph
      BOT_HOST: 0.0.0.0
      BOT_PORT: 8080
      ONEBOT_API_BASE: http://openclaw-napcat:3000
      TZ: Asia/Tokyo
    volumes:
      - .:/app
      - /etc/localtime:/etc/localtime:ro
    dns:
      - 8.8.8.8
      - 1.1.1.1
      - 223.5.5.5
      - 119.29.29.29
    extra_hosts:
      - "host.docker.internal:host-gateway"

    ports:
      - "127.0.0.1:${EXPOSED_PORT:-18080}:8080"   # 仅本机暴露，避免公开 HTTP 回调端口
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg14
    environment:
      POSTGRES_USER: languser
      POSTGRES_PASSWORD: langpass
      POSTGRES_DB: langgraph
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    restart: unless-stopped

volumes:
  postgres-data:
